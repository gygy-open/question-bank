name: Build Desktop

# Build the Windows server package and publish a draft GitHub Release.
# Version is driven entirely by the git tag:
#   git tag v0.2.0 && git push origin v0.2.0
# The tag (minus the leading "v") is stamped into the app before packaging and
# used to name the Release and its assets.
#
# NOTE: Currently Windows-only. macOS/Linux are intentionally not built yet
# (the app code stays cross-platform; only the service tooling is per-OS).
# To re-enable them later, add a matrix + systemd/launchd packaging.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

env:
  # Pinned WinSW release used to wrap the app as a Windows service.
  WINSW_URL: https://github.com/winsw/winsw/releases/download/v2.12.0/WinSW-x64.exe

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # --- Resolve version from the tag (v0.2.0 -> 0.2.0) ---
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev+${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      # --- Stamp the version into the app + package metadata ---
      - name: Stamp version
        working-directory: backend
        shell: bash
        run: |
          v="${{ steps.ver.outputs.version }}"
          printf '__version__ = "%s"\n' "$v" > app/_version.py
          sed -i.bak -E "0,/^version = .*/s//version = \"$v\"/" pyproject.toml
          rm -f pyproject.toml.bak
          echo "Stamped version $v"
          cat app/_version.py

      # --- Frontend: build the SPA that gets bundled into the executable ---
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm generate

      # --- Backend: PyInstaller single-file build ---
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'
      - name: Package backend
        working-directory: backend
        run: uv run --with pyinstaller pyinstaller run.spec --clean

      # --- Stage payload + build the GUI installer (Inno Setup) ---
      - name: Build installer
        id: pkg
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"

          # Stage everything the installer bundles into Program Files.
          $payload = "installer_payload"
          New-Item -ItemType Directory -Force -Path $payload | Out-Null
          Copy-Item backend/dist/question-bank.exe "$payload/question-bank.exe"
          Invoke-WebRequest -Uri "$env:WINSW_URL" -OutFile "$payload/question-bank-service.exe"
          Copy-Item backend/deploy/windows/question-bank-service.xml "$payload/"
          Copy-Item backend/deploy/windows/README.txt                "$payload/"
          Copy-Item backend/deploy/windows/install-service.ps1        "$payload/"
          Copy-Item backend/deploy/windows/uninstall-service.ps1      "$payload/"

          # Compile with Inno Setup (preinstalled on GitHub windows runners).
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup -y --no-progress
          }
          $out = "installer_out"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          & $iscc "/DMyAppVersion=$ver" "/DPayloadDir=$((Resolve-Path $payload).Path)" "/O$((Resolve-Path $out).Path)" backend/deploy/windows/installer.iss

          $setup = "$out/QuestionBank-Setup-$ver.exe"
          if (-not (Test-Path $setup)) { throw "Installer not produced: $setup" }
          echo "setup=$setup" >> $env:GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: question-bank-windows-installer
          path: ${{ steps.pkg.outputs.setup }}
          if-no-files-found: error

  release:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          name: Question Bank ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*
          generate_release_notes: true
          # Build first, publish later: create a DRAFT so users never see a
          # release without assets. Review the notes on GitHub, then click
          # "Publish release" to make it public.
          draft: true
          # Tags with a hyphen (e.g. v0.2.0-beta.1) are marked pre-release.
          prerelease: ${{ contains(github.ref_name, '-') }}
