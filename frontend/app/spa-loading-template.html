<style>
  .spa-loading-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: #0f172a; /* Slate 900 */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    color: #94a3b8; /* Slate 400 */
  }

  .math-loader {
    position: relative;
    width: 200px;
    height: 200px;
    animation: rotate 60s linear infinite;
  }

  .dot {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 4px;
    height: 4px;
    background: #38bdf8; /* Sky 400 */
    border-radius: 50%;
    /* Scale up the coordinates by 2.5 */
    transform: translate(calc(var(--x) * 2.5), calc(var(--y) * 2.5));
    opacity: 0;
    animation: pulse 3s ease-in-out infinite;
    animation-delay: var(--d);
    box-shadow: 0 0 5px rgba(56, 189, 248, 0.5);
  }

  @keyframes pulse {
    0%, 100% { 
      opacity: 0.1; 
      transform: translate(calc(var(--x) * 2.5), calc(var(--y) * 2.5)) scale(0.5); 
    }
    50% { 
      opacity: 1; 
      transform: translate(calc(var(--x) * 2.5), calc(var(--y) * 2.5)) scale(1.5); 
    }
  }

  @keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .loading-text {
    margin-top: 2rem;
    font-size: 0.875rem;
    letter-spacing: 0.2em;
    animation: blink 2s infinite;
    text-transform: uppercase;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
</style>
